<form class="filters-form">
  <div class="filters-grid">
    <label class="filter-group">
      <span>Filter</span>
      <select [(ngModel)]="filters.sort_by" name="sortBy" (ngModelChange)="onFiltersChange()">
        <option value="popularity.desc">Popularity ↓</option>
        <option value="popularity.asc">Popularity ↑</option>
        <option value="release_date.desc">Release Date ↓</option>
        <option value="release_date.asc">Release Date ↑</option>
        <option value="vote_average.desc">Vote ↓</option>
        <option value="vote_average.asc">Vote ↑</option>
      </select>
    </label>

    <label class="filter-group">
      <span>Relase Date Min</span>
      <input type="date" [(ngModel)]="filters['primary_release_date.gte']" name="releaseDateGte" (ngModelChange)="onFiltersChange()" />
    </label>

    <label class="filter-group">
      <span>Release Date Max</span>
      <input type="date" [(ngModel)]="filters['primary_release_date.lte']" name="releaseDateLte" (ngModelChange)="onFiltersChange()" />
    </label>

    <label class="filter-group">
      <span>Vote Min</span>
      <input type="number" min="0" max="10" step="0.1" [(ngModel)]="filters['vote_average.gte']" name="voteAverageGte" placeholder="0.0" (ngModelChange)="onFiltersChange()" />
    </label>

    <label class="filter-group">
      <span>Vote Max</span>
      <input type="number" min="0" max="10" step="0.1" [(ngModel)]="filters['vote_average.lte']" name="voteAverageLte" placeholder="10.0" (ngModelChange)="onFiltersChange()" />
    </label>

    <label class="filter-group">
      <span>Filmmaker</span>
      <input [(ngModel)]="filters.with_people" name="withPeople" placeholder="Ex. Christopher Nolan" (ngModelChange)="onFiltersChange()" />
    </label>
  </div>

  <div class="genre-list">
    @for (genre of genres; track genre) {
      <label class="genre-chip">
        <input type="checkbox" [checked]="selectedGenres.includes(genre.id)" (change)="toggleGenre(genre.id)" />
        <span>{{ genre.name }}</span>
      </label>
    }
  </div>

  <div class="filter-actions">
    <button type="button" class="reset-button" (click)="reset()">Reset</button>
  </div>
</form>
